name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flutter-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install Dependencies
      run: |
        cd flutter-frontend
        flutter pub get

    - name: Run Analyze
      run: |
        cd flutter-frontend
        flutter analyze

    - name: Run Tests
      run: |
        cd flutter-frontend
        flutter test

    - name: Debug Failure
      if: failure()
      run: |
        cd flutter-frontend
        flutter analyze > ../flutter_error.log 2>&1 || true
        cd ..
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add flutter_error.log
        git commit -m "Capture Flutter CI error log [skip ci]" || true
        git push origin main || true

