name: Laravel CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
        coverage: none

    - name: Copy .env
      run: cp laravel-backend/.env.example laravel-backend/.env

    - name: Install Composer Dependencies
      run: |
        cd laravel-backend
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate Key
      run: |
        cd laravel-backend
        php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 laravel-backend/storage laravel-backend/bootstrap/cache

    - name: Execute Tests
      run: |
        cd laravel-backend
        php artisan test

    - name: Debug Failure
      if: failure()
      run: |
        cd laravel-backend
        php artisan key:generate > ../laravel_error.log 2>&1 || true
        cd ..
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add laravel_error.log
        git commit -m "Capture Laravel CI error log [skip ci]" || true
        git push origin main || true

