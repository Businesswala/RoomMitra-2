name: roommitra
description: RoomMitra Rental & Living Ecosystem Marketplace Flutter Client.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  dio: ^5.4.0
  go_router: ^13.1.0
  flutter_secure_storage: ^9.0.0
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.10
  google_fonts: ^6.1.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
